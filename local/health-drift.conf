# Health Drift Configuration — ziegeleiweg-pi
#
# Machine-specific expected state checked by the health-check skill.
# Edit this file when adding/removing apps, services, or changing network config.

# Expected Caddy site files (space-separated, without .caddy suffix)
EXPECTED_CADDY_SITES="adguard default home-assistant unifi _auth"

# Expected systemd units to be active (space-separated)
EXPECTED_SYSTEMD_UNITS="caddy adguardhome uos-webrtc-fix"

# Expected networkd-dispatcher hooks (space-separated, full paths)
EXPECTED_DISPATCHER_HOOKS="/etc/networkd-dispatcher/routable.d/50-dns-update"

# Netplan: expected static IP (grep pattern)
EXPECTED_NETPLAN_IP="192.168.2.32"
NETPLAN_FILE="/etc/netplan/50-cloud-init.yaml"

# Swap: is no-swap intentional on this machine?
NO_SWAP_OK=true
