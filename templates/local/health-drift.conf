# Health Drift Configuration — {{HOSTNAME}}
#
# Machine-specific expected state checked by the health-check skill.
# Edit this file when adding/removing apps, services, or changing network config.
# The health check reads these values to detect configuration drift.

# Expected Caddy site files (space-separated, without .caddy suffix)
# Example: EXPECTED_CADDY_SITES="app1 app2 default _auth"
EXPECTED_CADDY_SITES=""

# Expected systemd units to be active (space-separated)
# Example: EXPECTED_SYSTEMD_UNITS="caddy docker my-app"
EXPECTED_SYSTEMD_UNITS=""

# Expected networkd-dispatcher hooks (space-separated, full paths)
# Example: EXPECTED_DISPATCHER_HOOKS="/etc/networkd-dispatcher/routable.d/50-dns-update"
EXPECTED_DISPATCHER_HOOKS=""

# Netplan: expected static IP (grep pattern, leave empty to skip)
# Example: EXPECTED_NETPLAN_IP="192.168.1.100"
EXPECTED_NETPLAN_IP=""
NETPLAN_FILE="/etc/netplan/50-cloud-init.yaml"

# Swap: is no-swap intentional on this machine? (true/false)
NO_SWAP_OK=false
